息进行造句和句子纠错练习;短文和散文写作。", "KH160": "日常生活基础泰语交流;练习发音，训练泰语基础会话;泰语字母拼读，练习听、说;在不同情景下，融合中、泰文化使用恰当的泰语进行沟通。", "KB216": "组织管理的概念和理论，人力资本管理，组织领导，组织凝聚力，团队协作，组织沟通，管理伦理，技术在组织管理中的应用，为数字时代打造高绩效组织，工业 4.0 时代的组织概念和现代组织模型；组织的战略方向；组织与其内部和外部环境的相互联系。", "KB217": "生产与经营管理的基本概念及其重要性，产品设计及生产流程，项目管理，生产力规划，库存管控，转移和分配产品的物流管理， 供应链管理。", "KB218": "营销系统的组成部分，营销理念，影响营销活动的商业环境；消费者行为及其购买决策过程，市场细分，目标市场选择，产品定位；传统与现代营销组合，营销人员的道德准则，为营销传播创建简单数字媒体的技术，技术在商业营销中的应用，包括虚拟技术，增强现实技术和人工智能。", "KB219": "在有限资源条件下，以数学模型的形式分析商务问题并做出决策，包括线性规划模型、传输模型及其他模型等；规划和制定商务决策模拟，分析商务统计数据， 以及与商业研究相关的描述性统计研究。", "KB220": "财务目标、职责和道德，财务报表分析，财务规划和预测，投资决策，确定资本结构和资本成本，货币的时间价值，股息支付政策，运营资金管理，技术在财务中的应用。", "KB221": "经济学中价值、价格和资源管理的一般性原理，消费者行为，在完全和不完全竞争市场中决定商品供求的因素，完全和不完全竞争市场下的商业竞争战略；贸易、投资、货币和财政政策； 外汇汇率，国际收支平衡，数字经济概念与模型。", "KB222": "依据双重会计原理的会计原则和方法，贸易交易和经济事件分析，试算表制作，财务状况表和基本损益表，计算机程序在会计中的使用，使用财务报表中的信息来评估组织的绩效。", "KB223": "企业组织管理与商业活动相关法律，知识产权，信息技术法，商业伦理。", "KL301": "全球和区域变化的环境和趋势，国际政治形势，国际法，国际贸易中的知识产权法，国际文化潮流，国家间的经济一体化，重视区域集团之间的贸易。", "KL302": "国际商务的意义及其重要性，国际商务交易模式，影响国际商务的经济、政治、法律和社会文化因素，营销、制造、人力资源、财务和跨文化管理方面的战略管理，符合国际营商环境的问题及解决方案。", "KL303": "货物进出口的流程，与国际贸易有关的文件，国际支付方式，国际航运、保险和进出口融资。", "KL304": "分析选择目标市场，国际商务模式，产品报价单编写，及其他相关细节，包括产品质量和数量，产品包装，国际贸易合同，发生纠纷时的赔偿，对进出口公司进行考察访问。", "KL305": "东盟成员国及中国各领域环境，各国主要产业，东盟成员国及中国开展商务指南，目标市场，制定进入东盟成员国及中国市场的战略。", "KL306": "跨国文化管理概念及其对组织文化、沟通、工作行为、领导力、国际商务谈判的重要性；影响商务谈判的文化差异，谈判技巧和策略，谈判中的道德与礼仪。", "KL307": "国际娱乐业务管理的概念和重要性，进入国外娱乐业务市场的商业环境和战略制定，适合目标市场的国际营销策划，拓展国际娱乐业务的渠道，韩日娱乐业案例分析。", "KL308": "国际食品行业管理的概念和重要性，进入国际食品商业市场的商业环境和战略制定，适合目标市场的国际营销策划，业务拓展渠道，物流管理系统，食品行业当前和未来的技术，增加产品和原材料的价值，成功的全球食品行业企业案例研究。", "KL309": "在数字时代使用办公自动化工具，使用数字工具帮助分析问题的演示和可视化技能。使用数字解决方案解决商业环境问题，以及具体的市场情况；商业信息检索，商业职业生涯的技术准备。", "KL310": "电子商务对国际商务的重要性，电子商务对世界市场经济活动的影响，影响数字世界中国际业务的因素，线上商务，在线交易保护和安全系统 ，与在线业务相关的国际法律法规。", "KL311": "与国际电子商务相关的模型、技术和创新，消费者决策模型，制定国际电子商务业务计划", "KL312": "国际商务当前问题的案例研究，解决问题的策略，通过应用理论原理进行决策，讨论重要的国际商业问题，实现可持续经营。", "KL412": "理论与实践的研究与比较，国际商务中与工商管理相关的环境分析，商业项目规划设计，在专家指导下将理论应用于实践，在组织中开发运营模型，进行商业项目开发，商业项目评估，创新总结在分析环境过程中遇到的问题。", "KL411": "作为临时雇员在企业实习工作，负责与专业领域一致的任务或项目；撰写实习报告，并展示实习中的所得，并由导师和主管进行评估。", "KL313": "当前热点问题的自研，研究成果的展示。", "KL314": "分析国内和国际劳动力市场方向，为求职做准备，撰写简历，工作面试，个性发展。", "KE311": "酒店各部门内部英语交流，用英语与客户交流，句型结构准确，酒店行业英文文件制作基础知识。", "KE316": "根据英语语法结构写出正确的句子，包括单句和复合句，段落和短文写作，标点符号的使用，旅游业英文句子和短文写作。", "KE325": "有效提高阅读能力，抓住文章中心思想进行快速阅读和跳词阅读。 为获取所需信息进行快速阅读；根据语境进行推理和理解文章内容，猜测单词的含义；能区分事实与观点。", "KE327": "一般社交场合中使用的英语会话基础知识，介绍自己和周围环境，提出问题，描述事件和过程，关注交流的社会和文化方面，例如礼貌、使用语言表达兴趣和谈判。", "KE333": "先修课程：KE325 基础阅读技能  工作中常见文章类型的阅读，即业务报告、合同、协议、信函、新闻等；扩充在各种商业环境中使用的词汇和表达方式，提高独立阅读技能的策略和基本资源。", "KH351": "泰语字母的认读和拼写，发音、拼写、词汇、基本语法，日常生活中的对话。", "KH352": "先修课程：KH 351  交际泰语 1  阅读泰文文章，使用泰文撰写短文，阅读中的词汇和语法，日常生活中各种角色扮演情景下的对话。", "KH353": "先修课程：KH 352  交际泰语 2  泰语阅读和听力，新闻或简单文章的段落理解，写和说叙事及内容表达类短文。", "KH354": "读和听以理解文章中心思想并表达观点看法，进行比较与评判；说和写来呈现内容，内容的排列和连接，练习检查正确使用单词和成语俗语；初级语言表达。", "KH355": "先修课程：KH 354  交际泰语 4  读和听内容和语言相对复杂的文章，总结阅读或听到的文章内容，捕捉演讲者和听众的意图和风格，撰写各类文章，为吸引读者或听众，在说的过程中注意使用各种语言风格。", "KF301": "金融管理工具，在收益不确定性下的投资决策，营运资本和流动资产管理，管理分析与资本配置，资本成本和资本结构，增加企业价值的资本管理，股息政策，改善并购控制，清算。", "KF303": "含义；为支持和规划未来的业务进行财务分析和决策的目的；基于财务报表信息以及从其他来源查找信息的金融环境分析的各个方面；财务比率分析；趋势线；纵向缩小；现金流量表分析；预先财务报表；财务报告编写；使用计算机软件包作为工具的案例研究。", "KF305": "保险的意义和益处；保险理论和基础；保险业的结构和责任；非寿险公司和寿险公司必须遵守的规则；保险费用计算；现金退保价值计算；所得税扣除优惠；保险业的道德准则和伦理规范；保险基金；保险业务执照考试。", "KF306": "投资过程；收益与风险分析；投资工具；现代投资组合理论；有效市场假设下的证券估值；股权分析；债务工具分析；衍生品分析；替代投资分析；投资证券分析。", "KF311": "意义；跨国企业在国际金融中的角色和重要性；国际收支；外汇市场和汇率；影响汇率变化和汇率预测的因素；国际贸易财务管理；风险和对冲；国际金融市场融资和资本成本；外国直接投资；投资准备。", "KF312": "数字时代金融在职培训新理念；办公软件程序中的高级功能处理；金融业生产平台和工具的商业分析报告；提高企业家在实际商业环境中展示商业理念的能力；将金融职业适当地并有效地整合到社交媒体平台中，以增加价值。", "KF313": "关于会计信息系统的概念；制作用于行政管理的信息的工具；商业周期；组织内信息系统的元素；网络；会计信息系统中的风险及风险控制；关于人力资源规划系统的概念；发展会计信息系统的基础知识并带来区块链技术的创新；去中心化数据收集和记录技术；目前在管理和投资中使用的数字货币，以提高账户管理和金融服务的效率。", "KF331": "感知概念以及根据会计标准测量财务报表元素；与应收账款、收到的票据、库存、土地、建筑物和设备以及无形资产相关的资产会计框架；估值；减值；包括根据会计标准和相关法律呈现的财务报告呈现。", "KF332": "感知概念以及根据会计标准测量财务报表的元素；关于流动负债、非流动负债、所有者权益、所有者权益的变动、清算、每股收益（EPS）、收入确认、长期租赁以及现金流量表的会计框架；包括根据会计标准和相关法律进行的财务报告呈现。", "KF333": "成本会计概念；成本会计系统；作业单成本核算；生产成本；成本分配；业务成本会计；标准成本会计系统；报废品会计处理；联产品和副产品；为所有服务部门分配成本。", "KF334": "会计概念及用于管理会计创新业务和行政的会计信息；成本分类与分析；成本相关性分析；产量与利润；为决策制定准备财务报表；短期判断、投资决策；使用成本进行业务规划和控制；产品定价和管理；责任会计；绩效评估和转移定价。", "KF360": "运用金融与会计知识，通过报告、演示和课堂讨论，来对案例研究和当前事件中的各种问题进行决策分析和应用。", "KF412": "理论与实践的研究与比较，国际商务中与金融与会计相关的环境分析，商业项目规划设计，在专家指导下将理论应用于实践，在组织中开发运营模型，进行商业项目开发，商业项目评估，创新总结在分析环境过程中遇到的问题。", "KF411": "作为临时雇员在企业实习工作，负责与专业领域一致的任务或项目；撰写实习报告，并展示实习中的所得，并由导师和主管进行评估。", "KF314": "当前热点问题的自研，研究成果的展示。", "KF315": "分析国内和国际劳动力市场方向，为求职做准备，撰写简历，工作面试，个性发展。", "KF337": "关于现代管理的概念；战略成本管理和管理技术；成本分析和管理；成本会计系统中的新概念，包括目标成本、基于活动的成本。", "KF338": "内部审计和控制的概念；内部控制的性质和技术；审计的报告与跟进；良好的企业治理；风险管理流程。  先修科目：KF337 成本分析与管理", "KF351": "商业审查；商业重组；投资银行家的角色和职责；投资银行家的素质和道德；商业监管机构的规定。", "KF352": "投资组合的含义以及不同类型金融工具的定义；投资组合管理流程；投资组合的好处；现代投资组合理论；投资组合管理策略；用于增加投资组合收益和管理风险的工具；投资组合管理的测量与评估。  先修科目：KF 306 证券投资分析原理", "KF353": "个人财务的意义和重要性；使用金融工具进行财务规划；个人财务报表的准备以及使用比率进行分析；在个人生活的各个阶段设定目标和进行财务规划以实现财务自由；支出规划和债务管理；保险规划；个人所得税规划；投资规划；使用共同基金进行个人财务管理；退休规划和遗产规划。", "KF354": "信贷的含义和类型，包括来自金融机构和其他来源的信贷；确定审查标准和政策；不同类型的信贷；定量和定性数据收集；风险评估；信用审查；信用信息报告；债务分类；控制与跟踪；债务收集；问题债务管理技术。", "KF355": "企业风险管理的要素；公司风险的类型；机会或突发事件的管理；机会可能性和影响评估；风险评估技术；风险管理流程；各个层级的风险管理；组织中人员的角色和责任。  先修科目：KF 338 内部审计与管控", "KF356": "独立运营的特点；关于资产、债务、所有者权益的会计和内部管控；收入和支出；业务运营成果报告和财务状况展示，如银行、金融机构、医院、酒店、农业企业、旅游业、合作社、遗产和受托人、保险、中小企业。", "KB215": "职业英语听说技能；通过商务报告撰写、图表叙述、会议讨论等相关模拟创造体验；强调句子类型使用的重要性和语言的正确使用，撰写组织内外的各种商务通信。", "KF307": "使用金融工具进行财产管理规划以实现财务自由，包括财产的创造、保护、增加和传递，如支出规划、债务规划、投资规划、保险规划，包括遗产规划和退休规划；使用多个人生阶段的案例研究来培养技能并付诸实践；使用技术进行财产管理。", "KT375": "先修课程：KI 374  职业汉语  旅游业中的汉语沟通技巧，作品和项目展示使用的汉语表达，提供有关旅游业的信息，撰写和阅读一般业务中使用的汉语文件。", "KT305": "旅游业务的意义、重要性及类型；公司的设立，管理结构和运营；与旅行社和相关机构的业务联系；市场策略、人事管理与财务；旅游规划，探索路线和创建旅游清单，组织旅游的流程，组织旅游的销售价格计算和降低成本，规划和解决旅游中的问题，案例研究。", "KT311": "旅游动机，影响购买决策过程的内部和外部因素；按种族、文化和社会经济地位分类，不同类型游客的需求和行为；跨文化差异与跨文化交际，旅游行为现状及趋势。", "KT316": "旅游的背景、意义和重要性，旅游业的组成部分，旅游与服务业的基础知识，影响旅游的因素，旅游造成的影响，和旅游有关的重要法律，与旅游相关的机构，旅游业的现状及发展趋势。", "KT319": "信息技术对旅游业的重要性，互联网和软件在旅游业务中的使用，酒店管理技术，旅行社管理技术，旅游信息介绍技术，使用技术来提高客户参与度。", "KT322": "乘客和各类行李运输的概念和要素，运输的基础结构和设施，游客流量管理，旅游业背景下的物流运营，与国内和国际运输有关的法律法规，物流知识在旅游中的应用，旅游运输技术和运输业务的趋势，案例研究。", "KT327": "酒店和度假村的财务管理，人力资源，营销，休闲娱乐设施管理，安全卫生管理，满足客户需求的活动策划，度假村和酒店管理的法律，案例研究。", "KT328": "可持续旅游的意义、重要性和原则，旅游资源类型，旅游景点的环境与生态系统，社区旅游，可持续旅游资源管理和开发的政府政策，案例研究。", "KT329": "旅游英语听说技巧，旅游服务工作中的英语表达，包括接受预订、导游、提供景点和旅游项目信息、交谈、撰写和阅读相关报道。", "KT330": "在数字时代使用办公自动化工具，使用数字工具分析问题的演示和可视化技能，图片显示数据的信息系统，使用第三方平台检索商业信息，为从事旅游业务做技术方面的准备。", "KT363": "餐厅服务管理的概念和策略，菜单管理，成本控制，采购，检验、接收和存储，粮食生产计算及成本分析，餐饮服务原理与技巧，餐饮基础知识，服务设备，实践培训。", "KT364": "会展的类型和形式，奖励旅游，展览和商品展销，特色营销活动，会展业务要素，会展各个阶段涉及的策划和运营，参与组织会展的服务提供商和主要组织，会展专业人士行为准则，案例研究。", "KT331": "对当代问题的独立研究；提供高质量的研究报告。", "KT332": "研究国内和国际就业市场的趋势；工作申请准备；简历写作、工作面试和个性发展。", "KT411": "作为临时雇员在企业实习，负责与规定专业领域一致的任务或项目，报告撰写，从实践中获得的学习成果，并由实习指导老师和实习主管进行评估。", "GE177": "通过应用数字技术创造产品和服务的附加值；在各行业中开发兼顾可持续性的产品与服务（绿色产品与服务）；分析基础碳足迹、企业碳足迹以及产品碳足迹。", "EO100": "数字经济相关的概念，数字经济的组成部分包括基础设施、使用技术进行交易的安全性和信心（数据安全）、服务基础设施以及社会和知识资源的数字化（数字社会）。", "GE122": "哲学的理论、概念、原理和益处，对生活及周围事件各种问题的分析和批判，将伦理、道德和哲学的概念应用于高质量的生活。", "GE123": "有关种族的泰国文明基础知识、历史发展、政治、统治、经济、社会、宗教和艺术、泰国文化，以及泰国社会生活现今和未来的发展。", "GE136": "整合心理学知识和理论，通过了解人类的发展和自然属性，从而学会如何接受自己和他人，发现自我的价值，有智慧，情商高，适应能力强，并拥有解决问题的能力，运用道德原理，专注于积极的思想，从而使人类的生活变得更加完整和幸福。", "GE138": "民主社会中公民的意义，强调作为泰国公民和世界公民的义务、责任、参与、遵守法律和伦理道德原则。", "GE147": "运用与社区相关的社会学、人类学、心理学和环境学概念和理论，对社区进行思考、分析和学习，并付诸行动，从社区利益出发，培养责任心和公共意识。", "GE172": "东盟经济共同体（AEC）和中国在泰国发展中的作用，适应因AEC国家和中国经济、新商业、社会和文化发展造成的影响；了解AEC国家和中国在社会、环境、艺术和文化方面的差异以及进行跨文化交流。 GE 173生活与数字文化                                           3 (3-0-6) Life and Digital Culture 数字社会时代人类的生活方式，数字社会中良好公民的概念；了解新媒体，发展自我，在数字时代拥有良好的生活质量；善于发现自己和他人的价值；创造性地并对社会负责地利用数字系统；数字文化、数字安全、数字礼仪、数字访问、数字权利与责任、数字法律。", "GE174": "通过生物经济、循环经济和绿色经济（BCG）推动新经济的发展，实现碳中和（Carbon Neutrality）和净零排放（Net Zero）。国家和国际层面的可持续发展机构及其相关工作，涉及环境、社会和公司治理（ESG）的可持续发展理念及相关活动。可持续发展目标（SDGs）及相关活动的推进，倡导低碳活动的理念，实现可持续能源使用和消费的路径。", "GE176": "通过设计思维（Design Thinking）过程进行创新，运用理解问题、定义问题、头脑风暴、创建原型和测试以解决问题的技术。概念展示的技巧，创意设计工作和流程的技巧，以为产品和服务创造价值，并为组织和社会解决问题。", "LW103": "在宪法框架下涉及到日常生活、法治和民主原则的法律。 私法和公法各类法律基础知识，公民的权利和义务、争议解决和泰国司法程序。 日常生活中发生的运用法律的案例。", "PA101": "普密蓬·阿杜德国王陛下提出的充足经济哲学倡议的背景、含义和概念。 充足经济与生活质量的关系，将充足经济哲学应用于生活，接受全球化带来的变化，包括在泰国社会中运用充足经济和新理论取得成功并成为典范的案例研究。", "CE100": "为减少人力的使用、降低成本、提高产出质量以及减少对环境的影响使用机器人的基本原理；在日常生活和各行业中应用机器人创新；将机器人用于生产、服务、医疗、休闲娱乐 、教育和旅游；机器人系统的简单试用。", "CT101": "人工智能（AI）世界，利用技术和智能工具帮助人类更方便、更快捷地解决商业和日常生活中的复杂问题。利用资源减少对环境的影响，通过互联网连接各种设备，共同创造社会和商业效益。在商业和日常生活中应用人工智能和物联网，在未来创造新的商业和职业机会。", "CT102": "虚拟现实技术（VR）和增强现实技术（AR）的基本原理。VR和AR在日常活动中的应用。VR和AR在各个领域的应用，包括艺术、医学、教育、旅游、休闲娱乐、制造业和商业。Google、Facebook和Apple对于 VR和AR的开发案例研究。VR和AR系统的应用与试验。", "MA109": "应用数学和统计学发展 21 世纪的创新技能和技术以及泰国经济 4.0。数学和统计学的重要原理、函数、方程、概率论、随机变量、抽样、估计、假设检验；数据收集与分析，统计程序的使用，泰国 4.0 经济中即将出现的新职业的重要数学和统计技能。", "SC106": "新科学技术在工作和日常生活中的应用，纳米技术、氢汽车、3D 打印系统、科学技术造成的新商业和职业机会，在不影响自然和环境的情况下，以对社会负责的方式创造性地使用科学技术。", "LA161": "培养英语听、说、读、写技能，以准备工作相关的交流。内容包括介绍个人信息、家庭和过往经历，描述人物和物品的特征，表达情感，安排约会，以及使用技术进行工作场所的沟通。", "LA162": "培养英语听、说、读、写技能，以便在工作场所进行有效沟通。内容包括工作面试、电话交谈、会议交流以及书写电子邮件、信件和商务文件等。", "JP101": "平假名、片假名、基础词汇、基础日语句子结构，练习日语字母、词汇和句子的发音。", "JP102": "学习100个汉字，提升日语的听、说、读、写能力，以便在日常生活中进行交流。通过实践练习，掌握日常日语对话技能。", "KO101": "韩语的辅音和元音，基本韩语词汇和句子结构。学习韩语字母的发音规则，练习发音、词汇和基础句子的构造。", "KO102": "100个韩语词汇，用于日常生活中的听、说、读、写练习，并练习日常韩语对话。", "ZH301": "听、说、读、写技能，通过汉语拼音系统正确发音，正确书写汉字，学习至少350个与日常生活相关的词汇。", "ZH302": "先修课程：ZH 301 中文1 听、说、读、写技能，基础句型结构，增加至少400个日常生活中的新词汇。", "DS201": "运用艺术视觉要素、形式美法则，进行二维及三维设计，并将其应用于商业领域的创意设计实践中。", "DS202": "速写与线描技巧，以及各类物体的明暗光影表现，旨在为艺术与创意设计奠定基础。", "DS203": "基础数字软件及设计应用程序的使用，如 Adobe Photoshop、Adobe Illustrator 或 Procreate，用于进行各类形式的创意设计。", "DS204": "从史前时期到21世纪的艺术史；分析艺术家影响创作的多样化视角，并将相关知识应用于设计实践中。", "DS205": "色彩理论基础，包括原色、色轮、色调（冷暖色调）、互补色，以及艺术与设计中的用色原则；涵盖色彩心理学，以及如何将色彩理论应用于艺术创作与商业设计实践。", "DS206": "探索将文化标识与价值应用于设计的方法；创作反映文化独特性与多样性的作品；侧重对文化内涵进行分析、解构与阐释，并将其富有创意且恰当地应用于现代语境中。", "DS207": "艺术美的定义及其演进；艺术哲学原则、哲学家思想及理论；艺术作品分析方法。侧重于艺术审美与鉴赏经验对当代生活及社会的影响。", "DS208": "通过多样化的艺术媒介与工具进行创作；通过融合不同的艺术技法来提升艺术技能与专业造诣。涵盖绘画、色彩写生、雕塑等传统艺术形式，以及应用技术与软件创作的数字艺术。", "DS209": "艺术创作的基本原则；对艺术的基础理解及其重要性；从古至今艺术的发展历程；以及对艺术作品的分析与阐释。通过建立对传统艺术与数字艺术的鉴赏经验，旨在体悟艺术价值与美学内涵。", "DS210": "艺术与创意设计领域的中文专业术语及商务用语，旨在将其应用于设计专业的学术研究与职业实践中。", "DS211": "艺术与创意设计领域的泰语专业术语及商务用语，旨在将其应用于设计专业的学术研究与职业实践中。", "DS301": "创意商业项目，或由指定艺术与设计领域内的特定专题研究；涵盖开发流程、相关数据分析、成果汇报，以及所遇问题的归纳与总结。", "DS302": "开发创意商业项目，或针对艺术与设计领域内指定的特定专题进行研究；旨在体现创新思维、开发流程、专业造诣，以及在实际情境中解决问题的能力。", "DS303": "当前创意商业领域中的设计技法、创意商业理念及艺术趋势；培养适应艺术与设计界变革的视角；研究艺术与设计市场中的消费者品味；并从多维度构建设计的整体概观。", "DS304": "艺术与创意设计行业的创业实践；将设计技能与商业战略及市场营销相结合；产品的生产与销售；通过线上与线下渠道销售创意产品的营销策略。", "DS305": "消费者生活方式分析；用于开发生活方式产品的设计思维过程；设计要素的选择以及相应产品的适配与应用。", "DS306": "循环经济（Circular Economy）与可持续设计（Sustainable Design）的概念及原则；旨在设计流程中平衡环境、社会与经济三大维度。环保材料的选择、长寿命设计以及旨在减少负面影响的技术应用。通过项目实践，开展兼顾可持续性并契合联合国可持续发展目标（SDGs）的设计练习。", "DS307": "设计师数字身份标识（Identity）的构建；利用数字工具开发并设计能反映设计师个性特质的视觉形象。个人网站、社交媒体及在线作品集等多种形式的作品呈现与展示。", "DS308": "通过图文结合的方式记录创意；创作具有叙事性的插画；利用符号化语言与有序的内容编排实现信息的易读性；旨在通过创意沟通方法，将其应用于艺术与设计实践中。", "DS401": "进行毕业设计（Thesis）开题陈述；准备设计项目的初步资料；设定研究目标与项目范围；进行调研与数据分析；归纳问题点并制定设计解决方案；提交项目立项申请并取得设计执行许可。", "DS402": "整合相关学科知识进行设计创作；在导师的指导与监督下，承接毕业设计预研（准备）课程并开展持续的设计执行工作。通过委员会评审认可后，完成最终作品的创作、陈述并向公众展示。", "DS403": "进行设计职业实践准备；学习在专业机构中与他人协作；旨在积累实践经验并培养积极的职业态度。", "DS404": "开展艺术与设计专题研究；根据当前形势与市场需求，筛选并确定最适宜的研究课题。", "DS405": "开展与艺术设计学科及职业要求相契合的项目实践；对接来自外部单位、机构或企业的真实课题；通过成果陈述与经验交流，实现知识的跨界整合与协同创新。", "DS406": "进行设计专业实习；学习在专业机构中与他人协作；旨在积累实践经验并培养积极的职业态度。", "DS411": "运用多种技术与方法绘制时装画；研究基于时装模特比例的结构表达、服装组件及其构成；学习色彩运用及绘画应用程序辅助设计，旨在有效沟通、传达并创作出具有表现力的服装设计作品。", "DS412": "时尚的起源与演变；分析与评述社会现状、文化背景及技术发展对服装设计的影响；学习时尚流行趋势预测，并将其应用于设计实践中。", "DS413": "人体量体与规格确定；进行服装基础原型板型的实操打版，包括上衣、袖子、裙子、裤子及基础连体衣；并练习使用工业平缝机进行样衣缝制，旨在为服装设计提供技术指引与实现路径。", "DS414": "服装设计原理与流程；开展调研并搜集设计素材；构建极具创意的设计构思；学习如何将色彩、廓形与面料材质进行和谐匹配。", "DS415": "用于服装生产的各类织物、纺织品及材料的特性；纺织材料生产中的新技术；探讨将材料与纺织品应用于服装创作中的各种工艺与技术手段。", "DS416": "针对不同场合需求的服装制版与缝制；创作具有高度设计感的特殊场合礼服纸样，旨在通过创意作品实现商业化应用。", "DS417": "服装设计过程中的创意；尝试融合艺术、创新与独特个性的设计实验。灵感激发、设计构思开发、纹理图案创作与服装结构设计，最终开发出展现创意才华与专业品质的设计原形。", "DS418": "运用数字工具、计算机软件及各类硬件设备，结合相关的数字技术进行时装设计绘图。旨在实现服装设计作品的精准传达与展示，并以此在设计行业及时尚商业领域开展创意创作。", "DS419": "面向时尚商业的服装系列创作流程。通过分析市场动态、消费者生活方式与需求、社会现状及当前流行趋势，开发出既符合市场逻辑又具有高品位审美价值的服装设计作品。", "DS420": "时尚配饰（Fashion Accessories）的原型开发、设计流程与创意创作，包括包袋、鞋履、帽子、腰带及首饰等品类；学习产品的生产制作与陈述展示，旨在创作出既具独特个性又符合市场需求的配饰作品。", "DS421": "时尚产品分类与生产规划管理；门店运营管理及促销策略。尝试创建基础时尚品牌，并要求其品牌核心理念与视野具备社会责任感。", "DS422": "为提升品牌辨识度构建时尚品牌风格与核心识别度的关键要素。定义品牌特征、创造动态差异化优势；通过色彩应用、传播策略及视觉形式，清晰地表达品牌个性和灵魂，并使其在当下多变的世界格局中保持同步与一致性。", "DS423": "时尚造型（Fashion Styling）基础知识；为数字世界及时尚产业创作相关数字内容，使内容产出符合设计构思并精准传达所预期的品牌形象。", "DS424": "培养时尚创业者意识；学习商业机会分析与商业模式开发流程。市场营销调研、成本核算与经营成本管理；销售计划制定、门店陈列管理及产品季节性公关推广。", "DS441": "设计原理与构成要素；设计构思的建立及如何将构思转化为室内环境设计作品；学习适用于建筑内部空间的设计准则，以及在设计中应用人体尺度与人体工程学比例。", "DS442": "室内环境设计相关的原则、理念、理论及各项设计准则；旨在契合使用者需求与空间脉络的设计流程与方法。内容涵盖功能需求分析、美学价值以及影响环境的各项因素，并考虑到不同使用者群体的通用设计。", "DS443": "室内环境设计的基础原则与理论；空间布局、材料选择及功能用途；设备摆放原则、家具尺度与比例的确定。针对住宅、公寓、中小型建筑等多种形式的室内设计原则，使其功能用途与建筑场所相契合。以及创意构思与作品的陈述表达技能。", "DS444": "运用计算机程序进行基础室内装饰制图；包括平面图、墙体图、天花板图、立面图、剖面图及放大详图在内的二维（2D）图纸形式。", "DS445": "环境设计计算机程序应用的原则、理念、理论与实操练习；涵盖二维绘图与三维建模维度，旨在高效地陈述设计理念并传达设计作品。包括空间构图处理及视觉渲染开发（Visualization），以清晰地传递设计构思。", "DS446": "设计构思开发流程与制图实操；针对与功能用途相关的空间，并将其应用于商店及商业空间的室内环境布局规划。涵盖建筑使用的系统与安全性，以及适宜美感的营造。", "DS447": "商业建筑、公共建筑以及医疗康养机构的设计流程与空间布局规划技术；须遵循设计标准准则并满足特定的使用需求。", "DS448": "各类家具的样式原则、理论、设计理念与结构；家具尺度与室内装饰设计的关联性；针对不同情境下市场与使用者需求，进行活动家具与嵌入式家具设计。涵盖制图、透视图绘制、模型制作或原型开发，以及活动家具与嵌入式家具设计的材料应用。", "DS449": "与室内环境设计相关的建筑创新；应用创新技术以提升关联性、安全性并减少使用者之间的不平等；高效且可持续地选择并使用合适的材料。", "DS450": "在设计中应用泰国特征，以创造出能体现泰国价值与现代感身份特征的环境与产品；研究泰国文化与艺术元素，应用各类设计理念，创作出具备可持续性、保留泰国价值并满足现代使用者需求的设计作品。", "DS451": "室内设计施工部分的造价评估；涵盖室内设计施工费、系统工程费、家具费及相关各项标准设备的费用；研究项目可行性以及专业服务费。", "DS452": "设计构思开发与改良流程；空间内部问题分析流程，以及高品质、可持续技术与材料的选择应用；学习考量光影、色彩、通风系统维度的设计；施工制图及适宜氛围的营造，从而高效地满足使用者需求。", "DS453": "新常态下的室内环境设计；与相关设计流程和方法相关的原则、理念、理论及创新，旨在可持续地应对未来环境的变化。", "DS454": "室内环境设计专业执业流程，包括：与委托人（业主）对接、编制项目任务书、制定工作计划、与建筑师及工程师协作、提交方案草图及施工图、施工监理与验收。学习事务所内部的行政管理流程，以及与执业相关的礼仪、职业道德（守则）和法律法规。", "DS471": "将栅格作为平面设计有效工具的应用；学习栅格系统的基础、元素构图原则、设计中的平衡感、一致性与和谐感的营造。各类形式栅格的创建；针对文字、图片及图形元素的栅格布局设计。用于印刷媒介、网站及数字媒体的版式设计，以及栅格在现代媒体设计中的应用。", "DS472": "静止图像（摄影）与动态图像（摄像）的基础原则与技术；用于插画/配图工作的摄影；项目策划与作品制作。各类照相机的使用、布光、构图、镜头的选择及为了实现特定目的的相机设置。动态图像制作流程：包括构思、剧本创作、拍摄及后期剪辑，旨在通过视听媒体高效传达创意与故事；重点培养应用于平面设计的创造力。", "DS473": "数字插画（Digital Illustration）的创作原则与技术；满足多样化行业需求的插画创作；针对产品、广告媒体及其他数字媒体的插画设计。相关数字工具与软件的使用；视觉叙事（Visual Storytelling）技巧，以及使插画作品适配不同行业情境。", "DS474": "设计思维（Design Thinking）过程；创造性问题解决方法；案例研究；构思开发、原型制作与测试。融合考量环境与可持续性的设计理念。设计实操练习，旨在满足使用者需求并减少对环境的影响。", "DS475": "商业背景下对平面设计产生影响的信仰、价值观与文化；分析消费者信仰与品牌创建、标志设计、包装设计、插图以及公关媒介之间的关系。应用关于信仰的理念进行商业沟通，以满足目标受众的需求。", "DS476": "通过计算机设计与雕刻流程进行三维物体创作；学习三维设计基础、形态原则、物体的基本构成要素、塑形技术，以及雕刻所需的材料与工具应用。从构思到原型的创建、基础造型起模、细节刻画、表面纹理调整，以及技术与其他媒介的综合应用。", "DS477": "字体的意义与历史；字体设计原则、字体分类与设计风格。字体与平面元素的结合应用、字体插画设计以及用于品牌创建的字体设计。通过各类技术、现代科技及多样化媒介进行实验性字体设计。将文字与艺术及设计元素进行融合。字体设计理念的陈述与沟通，以及设计伦理规范。", "DS478": "品牌形象创建的研究、分析与设定；企业识别系统设计；图形元素与数字技术的应用；用于品牌传播的插画设计；在线品牌创建；创造性思维能力以及社会责任感。", "DS479": "用户体验设计；提升服务对象的体验感；物理体验与数字体验设计；基于品牌触点的体验设计；以及可创造多样化体验的媒介设计。", "DS480": "角色设计的原则与流程；创造具有独特性的角色形象；叙事技巧；角色外观、性格特征及肢体动作的设计技能。包括应用数字工具进行设计，并针对不同媒介与语境进行角色开发。场景与背景设计、画面构图、上色及光影表现技术；可应用于印刷媒介、动画、网络漫画及其他媒体。", "DS481": "动态图形创作；以有趣且具创意的方式进行信息与故事呈现。动态图形的基础理念；图形元素设计；选择适配动态影像的色彩、字体及插画。音效与特效的应用；并将其应用于数字媒体、广告、市场营销及其他创意领域。", "DS482": "视觉导向系统与标识系统；旨在为室内外空间使用者提供便利的图形符号设计。通用设计（Universal Design）原则；用于空间装饰的插画设计。图形设计原则的应用，以及使视觉导向系统适配室内外环境的实践。", "DS483": "产品开发理念；包装的职能、作用及其平面设计；产品结构与包装结构设计理念。功能性分析、市场导向型包装特征、信息传达；通过设计思维流程（Design Thinking Process）进行设计开发实践。", "DS484": "人工智能（AI）在平面设计与数字广告中的理念与应用；利用 AI 工具辅助平面创作及广告插画生成；应用 AI 工具分析消费者数据；通过数字平台创建广告活动。通过整合 AI 技术与设计流程的创意项目进行实操练习，旨在培养数字媒体行业所需的创新技能与战略思维。", "DS212": "各种数字工具与媒介在素描中的应用技术；结构、形态、色彩、明暗、光影、空间、维度、透视学原理以及色彩氛围的协调融合。通过多种技术手段，以创意作品和实验性作品的形式进行表现。", "DS213": "符号学（Semiotics）的理论与原则及其在设计中的应用；从古至今影响设计界的艺术与设计哲学。从社会、文化及技术等多维度分析并解读符号在设计中的运用；利用视觉图像替代文字进行意义传达；以及社会人群之间在形式与内容上的沟通传播。", "DS214": "设计构思开发；游戏机制图解；桌游设计流程。针对桌游的平面设计，包括卡牌、角色、符号及玩家手册设计；使艺术构思与游戏内容及机制相统一。游戏体验设计以及桌游原型制作。", "DS215": "学习并开发使用行业流行软件及工具创建 3D 渲染图的技能；三维建模、光影设置、材质与纹理的应用、摄像机设置以及最终渲染输出。此外还包括渲染后的后期处理技术，以实现最高品质的图像效果。", "DS216": "通过软件进行色彩创作、光影合成以及动态视频图形制作；并将其投影于平整地面及各类墙面，旨在为观众创造沉浸式的视觉体验。", "DS217": "利用计算机程序进行简易三维建筑建模；三维模型在设计中的应用；三维视觉角度、尺寸比例以及室内家具的平面布局设计。", "DS218": "基础室内设计；功能空间布局设计，旨在创造审美价值。综合考量设计基础要素，如风格、色彩、质感、材料、家具、灯光、留白及安全性，以满足居住空间使用者的需求。此外还包括用于成果展示的设计制图。", "DS219": "基础风水学理念与原则及其在住宅设计中的应用；理性且创意性地运用风水学说进行场地布局及居住空间家具布置。旨在促进空间平衡、繁荣兴旺，并提升居住者的福祉。", "DS220": "为满足商业需求的包装设计原则；兼顾功能需求、美学表现与市场推广。分析包装在品牌创建及吸引消费者方面的作用；探讨环保型包装设计趋势。涵盖包装设计流程、构思、材料选择、生产加工、印刷技术及成果演示。通过针对不同行业产品的包装设计实践，培养创造性思维与解决商业问题的能力。", "DS221": "摄影技巧及其在画面构图中的应用；相机操作、布光技术、画面构图、滤镜与色彩的选择，旨在通过多种形式的影像进行叙事。涵盖商业广告摄影以及针对在线媒体演示的摄影实践。", "DS222": "字体结构基础与性格特征；文字排版及针对各类媒介的字体设计。重点考量通过不同形式的字体实现清晰、准确的信息传达。", "DS223": "为满足艺术、文化、教育及商业沟通目的的创意展览设计流程。受众需求分析、空间管理、多媒体技术及设计要素的应用，以创造互动体验并提升观众参与度。通过构思开发、原型制作及成果展示进行展览设计实操。", "DS224": "为培养创新能力的“跳出框架”思维技术与流程；辨识问题、发现差异化机遇并寻求创新路径。应用各类艺术与设计工具及方法以激发创意；通过原型开发流程进行新构思的实验与演进。", "DS225": "通过在人台或 3D 模拟模型上应用立裁（Draping）技术，培养服装造型与结构创作技能。包括面料排布、抓褶、扭转、折叠以及通过堆叠层级增加设计维度；创作时尚装饰细节，如手工花卉制作、边饰处理及刺绣工艺。", "DS226": "利用数字工具与软件进行三维建模、虚拟服装仿真以及应用人工智能（AI）开发时尚作品。通过增强现实（AR）与虚拟现实（VR）技术进行时尚呈现，为设计、生产及面向消费者的展示环节创造新维度，旨在满足数字时代时尚产业的需求。", "DS227": "绘画创作；开发时尚插画的个人专项技术与独特风格。旨在为时尚杂志及公关媒体进行作品呈现的时尚插画创作。", "DS228": "通过多样化技术实验与不同材料应用，开展艺术创作流程；将其作为促进情绪与心理健康的工具。通过各形式的艺术创作，为自我反思、理解自我及共情他人提供契机。", "DS229": "针对特定受众群体的服装图案设计技术与流程，如运动队服、企业制服、社群服装或特定团体定制服饰。研究目标受众的特征与需求；选择能够反映该群体独特身份的色彩、形状及图案；并应用专业设计软件与技术实现高水准的服装图案设计。", "DS230": "数字插画艺术构思；针对不同语境的数字插画创作流程。通过数字技术实践，涵盖草图绘制、画面构图、光影布局及色调选择；同时培养创造性思维，旨在创作出既具独特风格又能满足数字产业需求的艺术作品。", "DS231": "漫画作品创作；研究角色设计基础概念、漫画叙事手法及数字绘画工具的应用。内容涵盖角色构架与组成、场景与背景设计、画面构图、上色及光影处理技术。作品可广泛应用于纸媒印刷、动画制作及网络漫画等领域。", "GE175": "通过应用数字技术为产品和服务创造附加值，并在各行业中开发考虑可持续性的产品和服务（绿色产品和服务）。涉及企业的碳足迹、产品的碳足迹、碳信用以及碳税。包括跨境碳调节机制（CBAM）的价格调整措施以及碳足迹的基本计算原则。", "GE171": "创造性思维，专注于创新产品生产的理念基础，以科技和创新驱动国家发展，培养人们具有创造性的思维方式，具备在商业领域取得成功以及进入劳动力市场所必需的条件。", "GE173": "数字社会中人类的生活方式，包括成为数字社会中良好公民的理念，了解新媒体以提升自身生活质量，重视自己和他人的价值，创造性和负责任地使用数字系统，推动数字文化的发展。学习在线安全（Digital Security）、网络社交礼仪（Digital Etiquette）、平等使用互联网的权利（Digital Access）、在网络社会中自由表达与承担责任（Digital Right andResponsibility）以及数字法律（Digital Law）的重要性。", "BA103": "数字创业的相关概念，各领域企业（重点是中小企业）经营方式的调整，参与产品和服务创造价值（服务创新）的竞争，通过应用数字技术和创新创造产品和服务的附加值。 成为具有社会责任感和道德的成功数字企业家的要素。 制定数字业务战略，在线营销和社交媒体，寻找资金来源，数字化企业的组织管理，并将组织发展成为社会企业。", "BA104": "高价值服务的相关概念，高价值服务的发展新方向，与高价值服务相关的新商业和就业机会，推动国家经济和企业家从传统服务业转向使用具备专业知识和技能劳动力的高价值服务业，从业人员会运用创新思维和科学技术，并进行研究开发。", "GE170": "关于泰国4.0以及先进社会、经济和工业的相关概念，使用创新技术发展现有产业并创造新产业。国家社会经济发展新方向，新商业和职业机会，可持续和负责任的社会和经济发展。", "FA207": "艺术元素组织原理，将艺术视觉元素与2D、3D设计相结合，应用于商业创意设计工作中。", "FA221": "艺术与创意设计美学，艺术哲学，对现代艺术的历史和哲学起着重要作用的哲学家的哲学思想和理论，并能够将知识运用到设计中。", "FA223": "为创意设计奠定基础的素描和线描技巧、各种物体的光影。", "FA225": "色彩使用的基础知识和心理学，对当代艺术创作产生影响的艺术家和设计师对色彩使用的影响，并将色彩理论应用在艺术和商业设计中。", "FA226": "影响设计的文化资本、智慧和地方文化，应用并进行创意延申，提高产品价值，实现可持续发展。", "FA227": "使用计算机程序和设计应用程序，选择使用合适的程序用于设计各种形式的创意作品。", "FA228": "艺术与设计史，分析从史前时代到21世纪影响作品创作的艺术家和设计师的各种观点，并将相关知识应用于设计中。", "FA229": "中文专业词汇，创意设计艺术领域的商业语言，将其应用于设计专业学习中。", "FA230": "泰语专业词汇，创意设计艺术领域的商业语言，将其应用于设计专业学习中。", "FA301": "摄影技巧、相机使用、基本灯光、摄影构图、文档准备，运用摄影技术知识来创作作品，在各种媒体上包括印刷媒体和在线媒体进行演示。", "FA302": "通过系统化的设计来构建身份认同感知，以通过多种媒体传达形象，并具备数字媒体设计师的伦理原则。", "FA303": "分析消费者的生活方式，创造性地设计生活方式产品，选择合适的设计元素和适用的产品，例如时尚服饰和饰品，室内装饰品。", "FA304": "动态图形、视频剪辑、以及选择适合用于创意设计和创作展示的程序和应用程序。", "FA305": "用于创建物体的模型和表面特征，以及在三维作品展示中进行视角和阴影布置的程序，以应用于商业模型的创建。", "FA306": "品牌建立的理念和原则，品牌设计相关的市场和数据分析，影响品牌成功的关键因素，对设计和制作工作产生影响的灵感和创新思维，品牌形象塑造和传播的方式，以及不同产品类型的品牌建立方法，案例分析。", "FA307": "字母的基本结构和特征，强调通过不同字体形式传达含义的清晰性，字体类型分类，选择与图形设计元素相关的字母。", "FA308": "利用图像传达含义，社会中人际沟通的形式和内容，艺术和设计中从过去到现在对设计工作产生影响的哲学。", "FA309": "店面陈列、展览、和心理学在展览设计中的实践原则，空间分配，定位，交通系统，展览元素，以及创意模型和比例的设计。", "FA310": "创造性思维过程，汲取来自其他学科的观念和技巧加以分析和综合，同时尝试新颖材料和技术，用于多样化的艺术和设计创作，超越传统的思维，以自由的方式设计和创作，以满足消费者的需求。", "FA311": "依据可持续性理念的设计原则和创造性过程，通过知识交流和问题解决思维的发展，以满足环境保护和减少当今社会不平等的需求，来设计和创作作品。", "FA312": "根据现实形势和市场需求，通过选择和定义研究主题对创意设计进行研究。", "FA401": "有关创意设计的业务项目或特定主题，包括开发过程、相关数据分析、呈现和总结问题。", "FA402": "有关创意设计的业务项目或特定主题，包括开发过程、相关数据分析、呈现和总结问题。", "FA316": "遵循时尚结构的比例和设计原则，使用不同技巧和方法绘制时装图像，能够传达、呈现和创造时尚设计作品。", "FA317": "通过裁剪不同类型的服装框架来制作版型和裁剪，以及利用创意制作商业作品的服装组件细节。", "FA318": "时尚界从过去到现在的演变和历史，分析和批判社会状况并预测时装设计的流行趋势。", "FA319": "时装设计原理和流程，搜索和收集数据，创意时尚设计理念，恰当地运用颜色、图案和材料。", "FA320": "时尚产品分类，用于生产计划的时尚产品管理，店面管理及 促销，尝试创建一个具有社会责任理念和观点的基本时尚品牌。", "FA321": "服装生产所使用织物、纺织品和各种材料的特性，用于生产原材料和织物的新技术，使用材料和纺织品来制作服装的技术和方法。", "FA322": "时尚业为适应市场和消费者需求、生活方式的改变、社会现状以及当代消费者时尚趋势而创建服装系列的过程，发展和提高有品位的服装设计理念。", "FA323": "学习使用服装绘图数字工具、技术和各种形式的媒体，以在设计行业和时尚业务中进行作品的交流、呈现和创造设计。", "FA324": "印刷媒体时尚产品的呈现原理、设计流程和呈现流程，与理念相符的产品展览、展示及摄影， 并能够表达出想要的形象特点。", "FA325": "形象创建的知识和重要要素，令人难忘的时尚品牌风格，确定身份形象，创造活力和差异，通过使用特定的颜色、表达方式和风格，清晰传达品牌特征，并跟上当今时代的变化。", "FA326": "时尚创业,，分析业界商机并开发商业创意，研究计算运营成本的概念和方法，以及销售策划、营销、店内产品布置、产品宣传。", "FA403": "提出论文题目，论文框架设计基本内容的准备，设定研究目的、研究范围，搜索及分析数据，总结研究问题和思路，解决论文设计中的问题，研究项目的审批申请。", "FA404": "整合所有相关学科知识用于创作设计作品，在导师的指导下，在论文准备这门课所学的基础上继续进行毕业设计。毕业设计完成并获得委员会通过后，需发表作品并向公众展示作品。", "FA405": "设计实习，与专业组织中的其他人合作，培养良好的职业态度。", "FA327": "设计原理和元素，概念创建，并将概念运用于室内设计，适用于建筑用途的设计标准，设计中要考虑到的人体尺寸和比例。", "FA328": "使用计算机程序绘制基本的室内设计2D设计图， 包括平面图、地面、墙壁、天花板、电气照明、插头、侧面图、剖面图和可放大图像。", "FA329": "室内设计的基本原理和理论；空间分配、材料选用和空间使用率；工具收纳原理，确定家具的尺寸和比例；各种风格的住宅、公寓、中小型建筑的室内设计原理，根据建筑物特点提高使用率；设计想法和作品的展示技巧。", "FA330": "制定设计概念开发流程，绘制与空间使用有关的设计图，用于商店、餐厅和商业区的室内设计，包括建筑物安全系统，并创造相应的美学效果。", "FA331": "依据规范的设计标准和需求，策划商业建筑、公共建筑以及医疗机构建筑的设计流程和项目规划技术。", "FA332": "设计固定和浮动家具的原理、理论和概念；家具的结构、材料、安装、坐标系制作技术和拆装系统。", "FA333": "利用创新技术实现与室内设计相关的建筑创新，为用户打造安全互动关系、减少不平等，并选择合适且可持续的材料。", "FA334": "评估室内设计工程的建设成本，包括施工、系统、家具以及相关设备的使用费用，研究项目可行性和专业服务成本。", "FA335": "从小型到大型商业区建筑改造的设计过程和技术，包括标准、相关法律、细节、设计和改造的施工流程，以及展现创意作品的技巧。", "FA336": "针对新常态下的室内设计，涉及设计的流程和指南，包括其原理、概念、理论和创新，以适应并支持未来可持续的环境变化。", "FA337": "室内设计的专业实践过程，包括联系设计承包商、撰写项目计划、组织策划、与建筑师和工程师合作协调、提出草案和施工计划、监督和检查施工过程、学习办公室内的行政流程和管理，同时了解与该职业相关的礼仪、道德规范和法律要求。", "FA338": "平面设计基础知识、平面设计的概念、流程和原理；设计工具使用技术，平面设计草稿制作、排版和元素排列；基本绘图，使用设计理论进行分析思维和传播设计。", "FA339": "网络媒体和印刷媒体页面布局中使用图形程序的基础理论知识与实践，网络媒体和印刷媒体等各种媒体的创作，例如明信片、海报、小册子、传单。", "FA340": "创建具有沟通交流功能的插图，使用计算机程序和各种类型的绘图技术，寻找独特的形象来创作插图，将插图运用在各种设计项目中。", "FA341": "数码相机摄影原理，数码相机的工作原理、照明技巧、测光方法以及图像合成原理。熟悉摄影工作室和户外摄影所需的器材，并强调在摄影中的创新，以便将这些技能应用到平面设计中。", "FA342": "产品概念开发和包装平面设计，设计理念，产品及包装结构；通过创意思维流程，进行效用分析，内涵传达，概念开发实践，以及合适材料的选用模式。", "FA343": "在各类场所广泛应用的导航图系统、标识系统以及通用设计；平面设计原理的运用，适用于室内外环境的导航图系统的正确运用；方向定位、装饰、材料选择、安装程序和生产技术，解决空间利用中的通信系统问题、字体应用以及导航系统技术。", "FA344": "用户体验设计，提升服务接受者的体验，物理与数字体验设计；透过品牌接触点的设计，创造出多样化的体验媒介。", "FA345": "设计和制作 2D 和 3D 动画媒体、剧本创作和情节开发；剧本创作、角色和场景设计；为了更好的演示效果及讲述故事，使用各种技术设计声音", "FA346": "信息检索、分析、概念确定、形象设计、组织身份、实践和系统化的图形设计应用，将设计应用于品牌建设。", "FA347": "广告的基础原理和市场分析，媒体策划，使用创意思维设计广告，以及通过消费者熟知的周边媒体，以专业并遵守道德规范的方式设计营销活动。", "FA348": "企业家精神的发展，业务中的关键流程，包括规划、管理、报价、市场营销规划、业务模拟撰写、商业沟通、组织内的图形应用、专业的作品收集和展示，以及创业准备工作。", "FA352": "视觉艺术鉴赏的理论与原理，创意的开发，视觉艺术的性质，视觉艺术的分析、评判和背景分析，为获得价值和美学的欣赏，解读艺术品的含义，评估艺术价值。", "FA361": "学习水彩画技法，涉及结构、形状、色彩运用、物体质感、光影表现、留白、维度和透视原理；通过静物和风景绘画实践，掌握绘图基本原理和各种技法。", "FA370": "丝印的理论与实践，包括筛网制作、块筛以及在纸张等材料上的丝网印刷，并结合多种设计原理，创作多种形式的作品。", "FA371": "绘制比例、尺寸、和细节合适的草图线条，运用不同色彩呈现外部场景的故事。", "FA372": "练习各种画线技巧，涉及结构、形状、色彩运用、物体质感、光影表现、留白、维度和透视原理，以及色彩氛围，各种创作性工作和实验性工作的传授技能。", "FA373": "涉及时尚领域的装饰品和饰品设计，包括包袋、鞋子、腰带、帽饰和饰品等。针对不同材料特性及制作工艺进行研究，将其与服装融合，创造独特的作品。", "FA374": "插画绘画技巧，时尚插画专业技能和个性发展；用于时尚展示和时尚传播媒体，如时尚杂志和宣传媒体的时尚插画。", "FA375": "各类时尚作品的分析原理，时尚作品征集流程，以创新媒体和信息技术创建多元化的时尚组合，包括数字文件、图像文件和现代创意媒体。", "FA376": "黑白摄影的原理和实践，利用艺术元素练习摄影技巧，冲洗胶片和放大图像的方法，强调以当代创新性和实验性艺术的形式传达意义的概念。", "FA377": "创建颜色和阴影，并使用程序创建视频图形，将其投影到墙壁等平面上，为观众创造沉浸式体验。", "FA378": "使用计算机程序模拟简单的 3D 建筑模型，在 3D 作品中使用模型、3D 作品的视角、距离、比例以及建筑物内使用的家具布局。", "FA379": "使用计算机程序的原理、理论和实践，运用其作为基本设计和绘图工作的工具。", "FA380": "室内设计基础包括空间规划与布局，涉及满足住宅用户审美需求的设计要素，如风格、色彩、纹理、材质、家具搭配、照明设计、空间利用与安全考量，同时也包括作品的图示展示。", "FA381": "基于风水学的基本科学理论和自然原理，用于规划住宅区域的布局和空间设计。", "FA382": "选择适用于不同类型产品的包装、材料类型和特性；包装设计的方法和与商业使用包装相关的过程。", "LA160": "发展英语听、说、读、写技能，以在日常生活中的各种情境下进行交流。包括基础对话、问候和自我介绍、讨论常见病情、描述地点和天气、谈论旅行以及假期活动。", "JP103": "学习额外的200个汉字，提升日语的听、说、读、写能力，达到更高水平。复杂句子结构、词汇和表达方式在不同情境中的使用。练习在各种场景中的日语对话。", "KO103": "学习额外的200个韩语词汇，提升韩语的听、说、读、写技能，更高层次的韩语写作，韩语复杂句子结构，在不同情境中使用词汇和表达方式。练习在各种场景中的韩语对话。", "ZH303": "先修课程：ZH 302 中文2听、说、读、写技能，复合句的构建，短文写作，增加至少450个新词汇。", "CA201": "含义、重要性、目标、组成部分、类型、过程和传播模型，从早期到现今的传播概念和理论，对传播产生影响的社会因素，传播在社会中的角色及对社会造成的影响，将传播理论应用于社会现象的分析，以及在商业中的运用。", "CA213": "数字摄影的原理和理论，数字相机的使用，图像语言的传播，摄影的各种技巧，摄影创意，图像构图，照片中的情感和氛围，光影的运用，使用电脑软件进行图像编辑，以及在传播学专业中保持职业道德。", "CA215": "主流媒体和新媒体中的新闻报道，新闻在各个层面的影响，阅读新闻以训练分析新闻报道的技能，新闻的基础知识，新闻价值，事件新闻与情境新闻的区别，新闻主题的构思，信息来源的查找，以及符合大众传媒职业道德的基础新闻写作原则。涉及大众传媒的法律法规及媒体的自我监管。", "CA218": "公共演讲的含义、重要性、原则与技巧，适用于大众传播的各种场合的演讲，面试、聆听、评论的技巧，有效表达的技巧，实践训练和提升演讲时的个性表现，以及根据工作情境调整演讲和表达方式。", "CA219": "传播学领域中美学的含义和重要性，审美判断标准，美学经验与问题，相关理论概念，艺术构成，以及用于传播意义的设计原则。", "CA220": "媒体从过去到现在的发展历程，媒体的本质，媒体的结构和系统，媒体生产者、消费者与媒体产业之间的关系，媒体的角色和功能，媒体生态系统中创作者、使用者、传播渠道、技术与社会环境之间的平衡调节机制。", "CA221": "叙事艺术的基本要素，不同叙事方式的技巧，内容与形式设计的概念，实践训练中使用图像和声音作为传播工具在传播学中的应用。", "CA222": "数字时代的市场营销和营销传播原则，概念、特点及传播工具的演变，包括广告、公共关系、促销、直销和人员推销。介绍传统媒体与数字媒体的基本原则与概念，以便符合数字时代消费者行为的需求。", "LA241": "组织沟通中的听说技能，包括电话交流、讨论和会议，阅读和撰写消息、记录和电子邮件，重点关注语言的形式和功能。结合模拟情境和独立项目，以适应商业和社会环境。", "DI315": "关于自我认知的概念与理论，如何在多种媒体中进行自我分析并创造性地展示自我，通过媒体进行自我展示的策略，分析受众以增加关注者数量，网红（Influencer）的角色，实践创作能反映自我与身份的内容，塑造个人形象以成为思想引领者。", "DI316": "适用于播客和直播的数字内容创作实践，包含每个步骤的创意流程、拍摄、剪辑、画面编排，以及提高目标观众参与度的技巧和效果评估。训练使用相关设备、程序和技术，以适应平台并满足需求。", "DI317": "创新媒体的概念与理论，创新媒体在社会层面的重要性，创新媒体的设计与规划，使用现代创新媒体进行数字内容创作。通过案例学习，并进行媒体创作的设计与规划训练。", "DI318": "内容筛选，数字媒体内容设计与叙事技巧，写作形式，内容创意，语言运用技巧，将故事转化为适合所有数字平台的图像和声音表达。", "DI319": "图像与图形设计，利用图像、声音和背景音效传达信息，用于数字内容创作。实践训练使用电脑软件设计能适用于多种媒体平台的图像与图形。", "DI320": "实践创作涉及生活方式、健康、美容、美食、旅游和科技等领域的数字内容，涵盖多种平台的制作和后期制作过程。基本原则包括技术实践和适应平台需求及目标受众兴趣的团队管理技巧。", "DI321": "实践创作数字内容，以促进可持续发展，涵盖社会议题、弱势群体和环境保护，应用于多种平台的制作和后期制作过程。基础原则包括技术实践和适应平台需求以及目标受众兴趣的团队管理技巧。", "DI322": "跨媒体叙事的概念、理论、技术与策略，通过案例学习，训练跨媒体叙事技巧，用于内容创作。创作的媒体内容可应用于商业领域和社会推动。", "DI323": "数字媒体研究的概念、方法和流程，研究的基本原则，包括信息检索、信息筛选、数据收集与分析、撰写研究报告、多样化引用来源的使用，以及将信息整合应用于内容创作中的道德规范。", "DI324": "通过有价值的数字内容进行市场营销，以多种媒体形式作为与目标客户群体沟通的工具。实践包括内容营销创意、内容营销活动策划，以及目标群体的内容触达技巧，搜索引擎优化（SEO）技术的运用。", "DI325": "数字内容创意创业的原则，包括内容创作、社群管理员、生产管理、平台管理和业务管理。涉及创立企业、制定商业计划、寻找商机、融资、创收、业务管理、财务和市场营销，同时涵盖与合作伙伴、客户和内容粉丝的合作流程。", "DI326": "计算机犯罪基础法律知识、知识产权法、电子交易法、个人数据保护法、职业道德，以及分析与数字媒体传播相关的伦理与法律情境。", "DI404": "与创业相关的概念和理论，分析与商品和服务业务相关的案例研究，将数字内容和媒体创意知识应用于创业，包括项目的规划、设计、开发和评估。", "DI401": "研讨型教学，旨在分析和交流关于数字内容与媒体制作的学术和专业知识，同时研究分析泰国数字媒体和新媒体的现状与问题。通过小组分析、讨论和共同表达意见，提供问题解决的指导方针。", "DI403": "在企业中作为临时员工进行实践工作，负责符合专业领域的任务或项目。撰写报告并展示从实践中获得的学习成果，工作表现将由带教员工和实习指导老师进行评估。", "DI405": "在企业实习，撰写实习报告，由实习负责人进行评估，通过研讨会讨论和评估实习成果。", "DI406": "自主研究，在导师的指导、监督和管理下，提出课题并编写报告/项目，主题涉及数字内容与媒体创作。", "DI354": "公共领域的概念与理论，泰国媒体生态中的新媒体和媒体环境的变化，新媒体与社会的关系，新媒体对个人和社会在经济、政治、社会和文化方面的影响，新媒体用户的伦理道德，用户对社会的责任。", "DI376": "各类评测内容创作的原则、技巧与实践，包括图片评测、视频评测，通过数字平台和社交媒体以创意、有吸引力和恰当的方式呈现。涉及个人形象的塑造、声誉的建立，以及评测作者的高效与有效的工作方法。", "DI377": "在数字平台上制作新闻和纪录片的形式、技巧和呈现方式，旨在报道真实事件，采用吸引人且富有创意的呈现方法，同时遵循道德框架。", "DI378": "播音员和主持人的工作、角色和职责，节目主持技巧、讲话方法和公告发布，成为数字媒体平台上的YouTuber或网红的要点。包括麦克风的使用技巧、正确的语音和语调规范，作为主持人和节目执行者的素养，探索个人风格和特点，以及成为数字媒体平台上的主播的技能。", "DI379": "艺术家的规划、管理、应急问题处理与危机管理，旨在为艺术家打造品牌和个人形象的内容创作。", "DI380": "活动和展览的概念设计与创意思维发展，利用媒体进行活动和展览的策划，使用项目管理工具，以及在线和线下形式的创意活动策划。", "DI381": "分析和比较国际内容产业的概况，制定将内容开发为满足客户需求的创意作品的策略，并将其推向全球市场。", "DI382": "创意产业的概念与模式，发展本土媒体和社区媒体以增加经济价值，并作为软实力（Soft Power）的途径，结合案例研究及实际应用。", "DI383": "音乐节的策划与管理的步骤、方法、类型和形式，实践音乐节在各平台的组织工作，包括音乐内容创作、在线媒体上的音乐节策划、协调沟通以及音乐节活动完成后的传播推广。", "DI384": "将设计思维应用于媒体设计和传播问题解决，以实现多样性和可持续性。包括案例研究和实践训练。", "DI371": "校外实地考察，以开阔视野并为毕业后的工作做好准备，包括工作视野、工作标准、职业道德、人员管理，以及用于节目制作的创新和新技术。", "DI385": "信息图表的设计与创作，数据分析与整理，通过图像讲述简单易懂、易于记忆且有效的故事，用于数字媒体的制作。", "DI386": "声音的特性与类型，声音设计与应用，通过多平台传递故事的技巧和过程，创作播客的技术。实践包括播客的策划与制作，以适当的方式为听众创造共鸣体验。", "DI387": "摄影基础知识、设备，动态摄影的概念与技巧，动态摄影在数字媒体中的应用，设计、布光和图像的表达，特殊效果的运用。实践包括使用辅助设备进行动态拍摄，构图、叙事、情感和解读在动态摄影中的应用。", "DI388": "图像和声音的表达技巧与方法，包括调色、混音、图形设计、特效和剪辑，以适应每个平台的需求并富有创意地呈现。", "DI389": "动画的类型、角色设计、个性塑造、姿态、服装设计、道具和场景设计、特效技术，以及将动画应用于数字内容创作的方式。", "DI390": "可用于多种平台传播的创意短内容的概念、形式与制作。分析当前社会趋势，将社会热点应用于内容创作。", "DI391": "在虚拟工作室中创作内容，学习用于节目制作的设备、技术和系统，掌握虚拟工作室系统，以在元宇宙（Metaverse）中进行内容创作。", "DI392": "制作适合在YouTube平台展示的视频短片，将其他平台的内容调整后在YouTube上发布。包括YouTube平台的技巧、推广方法和盈利策略。", "DI393": "实践制作面向弱势群体的媒体内容，如儿童、残障人士和老年人，利用多种媒体渠道，促进媒体的可及性，增强社会理解与包容，推动平等，尊重差异。", "IT240": "计算机网络基础、计算机网络的类型、网络的基本组成部分、网络体系结构、开放系统互连（OSI）模型、数据通信标准与外围设备、互联网中的基本协议和子协议、网络安全问题、物理层面的防护与安全维护、安全标准以及系统恢复。", "IT244": "数据科学基础知识，包括数据获取、数据准备与预处理、基础数据分析及分析结果的应用。商业智能基础知识，包括组织的数据基础架构、商业分析方法，例如联机分析处理（OLAP）与数据可视化等。通过集成相关技术并结合现成软件，为组织构建商业智能能力。", "IT262": "信息与通信技术在数字化时代运营中的作用；数据处理器与软件；用于软件开发的计算机语言；数据与数据管理；数据通信与网络；互联网及其应用；人工智能技术；物联网（IoT）技术；虚拟现实与增强现实技术；信息系统的威胁与安全；信息技术职业中的伦理、道德与专业理念的概念与重要性；个人数据保护法的基础知识。", "IT263": "关系与函数，集合，逻辑学，布尔代数，初等数论，计数方法，递归关系，概率论，图论基础知识，图的应用，树与网络，最短路径问题，矩阵及其应用。", "IT264": "概率基础，描述性统计，估计与统计假设检验，随机变量，离散与连续型随机变量的分布，统计量的分布及其在决策和日常生活规划中的应用，抽样与样本量的确定。", "IT265": "业务运作中使用的各种基本流程，包括财务、会计、人力资源管理、采购与供应、原材料计划、工厂装配、客户服务、数据生命周期管理、订单管理、项目管理以及组织战略规划管理；商业模型图的绘制；有关知识产权法、电子商务法以及信息技术相关法律在社会与组织语境中的基础知识。", "IT266": "现代程序设计技术基础；利用计算机解决问题的算法与编程基础结构；多种程序设计理念，例如结构化程序设计、面向对象程序设计、事件驱动程序设计和模块化程序设计等；问题分析、与问题解决相对应的编程范式与方法；计算机程序的测试与调试。", "IT267": "面向对象架构的概念与实践；基于面向对象思想的系统分析与设计以及用户界面设计；面向对象程序设计；封装（Encapsulation）与多态（Polymorphism）的概念；类（Class）与接口（Interface）的创建；继承（Inheritance）；实例（Instance）的创建与使用；异常处理编程；利用面向对象思想与技术进行系统开发。", "IT358": "各种基本数据结构与数组（Array）、栈（Stack）、队列（Queue）、链表（List）和树（Tree）；数据存储空间的分配；适用于数据结构的基本算法；多种数据排序技术；集合、哈希表、图；以及与不同数据结构应用相关的操作实践。", "IT359": "计算机的工作特性，包括硬件与软件的协同作用；存储器的工作原理；中央处理单元（CPU）；输入/输出（I/O）系统；存储层次结构；操作系统结构；进程管理；内存与辅助存储管理；计算机系统内部资源分配；文件系统；多处理器系统；进程间通信；以及不同类型计算机操作系统的实例。", "IT322": "软件开发生命周期中的质量保证与维护；系统测试的类型；手动测试与自动化测试；多种系统测试技术，例如黑盒测试与白盒测试；测试文档的编写，如测试用例（Test Cases）、测试脚本（Test Scripts）和测试场景（Test Scenario）；软件质量的度量方法；与质量保证相关的规范与标准；软件的可用性、可靠性、缺陷问题以及软件维护。", "IT347": "信息系统开发项目管理的重要性与步骤；项目管理生命周期；项目管理知识体系（PMBOK）；项目可行性研究；项目章程（Project Charter）的制定；项目规划；需求收集；项目范围管理；项目预算、时间、成本、资源与质量管理；项目风险管理；项目管理中技术的应用；信息技术项目提案的呈现；项目的跟踪与评估；变更管理与项目收尾。", "IT363": "信息系统与网络的安全问题；风险管理以及网络设备的物理防护；信息系统的安全控制与维护；计算机犯罪；安全级别评估；信息系统访问控制；安全标准；系统恢复；硬件、软件与网络的安全；密码学的应用；路由器的安全配置；交换机配置以建立虚拟局域网；通过公共网络建立虚拟专用网络（VPN）；网络安全与网络犯罪防护。", "IT368": "云计算的基础与原理；云计算系统基础架构的规划与设计；云端软件服务及云端应用程序开发；云端计算与存储的访问；传统系统向云计算的迁移。", "IT369": "物联网（IoT）的基本原理与必要性；传感器数据采集；海量数据管理技术；用于改进数据采集过程的数据分析技术；实现设备间通信的标准化基础架构；嵌入式系统在可通过互联网通信的设备中的应用；远程控制系统的基础架构；以及该技术的未来发展。", "IT373": "信息系统的定义、重要性与组成部分；信息系统开发的战略与生命周期；系统分析员的角色与职责；信息技术项目的启动与管理；系统分析与设计所使用的工具；数据流图、数据关系图的绘制与数据库设计；分析结果的文档编写与展示；用户界面设计、数据输入与输出设计；程序开发、测试、安装与系统维护；面向对象系统的概念；使用 UML 语言进行面向对象的系统分析与设计。", "IT374": "移动设备操作系统；移动设备上的系统设计与开发；使用软件开发工具包（SDK）进行移动应用程序开发；通信模块的使用；数据库系统的 使用应用软件在计算机上创建多媒体作品。", "IT384": "互联网营销与社交媒体的概念；互联网营销的商业环境；社交媒体与网络平台在营销中的应用；互联网与社交媒体营销战略的制定；目标群体的确定；互联网营销组合；营销方法与途径；电子客户关系管理；社交媒体技术。", "IT386": "C 语言的程序设计原理与结构；过程式程序设计的工作机制；利用各种控制结构实现程序设计；条件语句与循环语句；数组与文件处理；函数与子程序的编写；程序的调试与测试。", "IT391": "面向办公工作的自动化系统（Bot），结合规则引擎（Rule Engine）、图像识别、机器学习与人工智能等技术，实现工作流程自动化并提升工作效率；机器人流程自动化（RPA）系统能够替代人工执行相关任务。", "IT394": "数据的类型、数据处理与数据状态；利用 ASP.NET 技术构建 Web 应用程序；Master Page的使用；使用 Web 控件工具组进行网站设计；结合数据库应用 Web 控件工具组；开发基于Web 的程序以实现与数据库的交互。", "IT395": "关于 Systems Applications and Products (SAP) 系统的基础知识；系统架构；系统的组成部分；数据与管理；系统配置；以及 SAP 系统中各类模块的应用示例，例如财务、销售、资源管理、生产计划与人力资本管理等。", "IT396": "金融管理系统的基础知识与企业中不同形式的财务管理；金融科技相关 API 的应用，例如金融信息交换协议（Financial Information Exchange Protocol, FIX）与开放银行（OpenBanking）；人工智能在金融科技中的应用示例，如异常与欺诈检测（Anomaly and FraudDetection）、智能投顾（Robo Advisor）等。", "IT397": "区块链技术基础；区块链的类型；区块链架构；区块链生态系统的组成部分；密码学与加密算法；共识算法；区块链技术在金融科技（FinTech）中的应用案例研究。", "IT405": "与商业数据分析相关的专题技术与方法；课程主题由导师与信息技术与人工智能专业共同商定与选定。", "IT410": "在企业中以临时员工身份进行实习工作，承担与所学专业相关的任务或项目；撰写实习报告，并展示从实践中获得的学习成果；由企业导师和指导教师共同进行评估。", "GE205": "小微创业者的商业理念；设计思维流程；Persona Canvas 与价值主张画布（ValueProposition Canvas）流程；对商业可行性及相关环境的分析；商业目标的设定；组织战略规划；企业经营中的服务心理学；Gen Z 时代的人力资源管理；市场营销与数字营销；品牌建设；产品与服务附加价值的创造；用于商业决策的成本—产量—利润计算；产品或服务定价；相关会计与税务处理；将信息技术应用于管理以提升企业运营效率；简要商业计划书的编制；以及在考虑社会责任与可持续性的前提下，Business Model Canvas 与原型（Prototype）的制定。", "GE201": "人体的基本结构；人体各系统；代谢过程；蛋白质、碳水化合物、脂肪和核酸的结构与功能；遗传与遗传性疾病；营养素、营养学及与营养相关的疾病；药物的使用及其副作用；精神疾病；日常生活中的心理健康照护。", "GE202": "影响健康与生活质量的因素；营养学原理；正确的饮食选择；健康食品；膳食补充产品；用于健康照护的草药；体重管理；有益健康的身体锻炼；体育运动；心理健康的促进；压力管理技巧；放松与冥想；为健康而进行的行为改变；疾病预防与长期健康促进；个人生活与工作之间的平衡。", "GE203": "中医医学；泰医医学；能量医学；自然疗法；音乐疗法；艺术疗法；水疗；肠道灌洗；身心平衡原理；身心调养；积极思维；顺势疗法（同种疗法）。", "GE204": "抗衰老医学；衰老理论；自由基与抗氧化物；炎症与机体退化；激素缺乏；代谢系统功能不足；环境毒素；排毒；睡眠与压力；皮肤老化及站立。", "SC218": "人体的结构与功能；细胞、组织及器官在呼吸系统、心血管系统、血液系统、免疫系统、皮肤系统、肾脏与泌尿系统、消化系统、神经系统、肌肉、骨骼与关节，以及眼、耳、鼻和喉等方面的功能；人体生殖系统和内分泌系统；以及体液与电解质、代谢过程，以及为维持机体处于正常状态而进行的调节反应机制。并探讨人体结构与功能与疾病及病理状态之间的关系。", "SS201": "体育与运动科学的发展历程；体育与运动科学的基本原理；与体育与运动相关的解剖学、生理学、心理学、营养学、生物力学及医学的基础概念；体育与运动科学在健康促进、疾病预防、体能发展以及抗衰老方面的作用与重要性；相关职业、职业标准与职业道德；以及体育与运动科学的专业术语。", "SS202": "与体育与运动科学相关的解剖学，涵盖肌肉系统、骨骼系统、关节、神经系统以及血液循环系统的结构与功能。", "SS203": "与体育和运动相关的人体各系统的原理与运行机制，包括肌肉系统、心血管与血液循环系统、呼吸系统、神经系统以及能量系统；不同类型运动中的生理反应，以及人体对体能训练的适应过程。", "SS204": "与体育与运动科学语境下人体运动相关的生物力学原理与理论，包括力、运动、平衡以及关节与肌肉的作用机制；人体运动的基本原理与理论；人体运动的分析原理；运动与运动控制；影响运动模式的解剖学、生理学与心理学因素；体育技能、体能、运动损伤预防以及运动、训练与体育竞赛中的运动效率，以依据抗衰老科学原理实现最佳健康状态。", "SS205": "与体育与运动科学相关的营养学原理；宏量营养素与微量营养素的作用；不同运动水平的运动员及锻炼人群的能量需求；营养对体能、身体恢复、体能提升以及机体退化延缓的影响；营养的适当与安全应用，以提升体育运动表现、促进健康并延缓衰老。", "SS206": "与体育与运动行为相关的心理学原理、理论与概念；动机、目标设定、压力与焦虑管理、注意力控制、自信心的建立；影响运动员及锻炼人群体能与健康状态的心理因素；运动行为及锻炼的持续性，以提升体育运动表现、促进健康并延缓衰老。", "SS301": "体育与运动训练的基本原理；体能相关概念；力量训练原理；功率与爆发力训练原理；耐力训练原理；速度训练原理；灵敏与敏捷训练原理；反应速度训练原理；柔韧性训练原理；平衡训练原理；训练计划的制定；以及人体对训练的适应过程。", "SS302": "体育、运动与抗衰老医学的基本原理；危险类型及运动损伤的原因；与运动损伤相关的因素；各种急救方法；运动与身体锻炼损伤的预防与康复；以及对运动员和锻炼人群的一般健康与安全照护。", "SS303": "健身、体育与抗衰老相关业务的管理原则与方法；战略规划、市场营销、财务管理、人力资源管理以及经营绩效评估；领导力、团队合作以及合乎伦理的实践。", "SS304": "运动员个人管理的原则与方法；职业发展路径规划；营养方面的管理；时间管理；财务管理；身心健康照护；以及形象塑造与媒体及社会关系的管理。", "SS305": "对体能各方面的评估，包括肌肉力量、肌肉耐力、肌肉功率或爆发力、呼吸系统与心血管系统耐力、速度、灵敏与敏捷、反应速度、柔韧性和平衡能力，以及身体成分，并包括数据结果的解读。", "SS306": "人体姿势与运动模式的评估原理；肌肉失衡状态；关节异常；以及对运动姿势异常与肌肉失衡状态的评估技能实践。", "SS307": "将体育与运动训练原理应用于不同类型运动体能训练计划与训练方案的制定，包括个人项目与团队项目；基本训练原则（F.I.T.T.）与训练周期规划（Periodization）；对各类运动项目体能需求的分析实践；以及安全的运动体能训练方案的制定。", "SS308": "制定用于纠正缺陷并恢复人体运动功能至正常状态的运动方案；实践对肌肉活动的抑制或放松、肌肉拉伸、肌肉激活、增强薄弱肌群力量，以及强调多维度运动并同时运用多组肌群的锻炼方式。", "SS309": "体育与运动科学领域的专题内容，相关主题与内容每年有所调整，并在体育与运动科学专业指导教师的同意与遴选下确定。", "SS310": "老年人随年龄增长所出现的生理与心理变化；常见疾病与健康状况；运用体育与运动科学原理制定安全的运动方案；心血管系统耐力、力量、柔韧性、平衡能力及灵敏性的培养；以及与老年人进行沟通并激发其持续参与运动活动的动机。", "SS311": "体育与运动科学中抗阻训练的基本原理；肌肉的作用机制；肌肉力量与肌肉量的发展；根据既定目标制定适当的训练方案；各类器械与设备的使用，包括自由重量、器械重量及自身体重；以及对正确且安全动作的示范与教学实践。", "SS312": "模仿日常生活活动及体育运动的动作；将体育与运动训练原理应用于功能性训练；对各类活动中动作需求的分析原理；以及对正确动作的示范与教学实践，包括一对一教学与团体教学。", "SS313": "基础健身运动的基本原理；音乐中的动作；有氧舞蹈的基本要素（基础动作、计数、完整动作、方向、动作特点及手臂的运用）；自由编排与呈现动作组合；以及有氧舞蹈的示范与教学实践。", "SS314": "针对锻炼人群与运动员的按摩原理与技术；用于肌肉放松的按摩；用于训练后恢复的按摩；以及刺激性按摩，并进行不同按摩技术的实践操作。", "SS315": "发展历程；基本原理；呼吸训练技术；瑜伽练习实践；瑜伽训练的类型；瑜伽体式练习中肌肉的作用；瑜伽体式练习的步骤顺序；瑜伽练习对身心的影响；以及个人形式与团体形式的瑜伽示范与教学实践。", "SS316": "商业情境分析的原理；愿景、使命与战略目标的制定；内部与外部因素的评估；以及为在健身、体育与抗衰老领域中建立竞争优势而进行的战略规划。", "SS317": "管理者所需的沟通技能；理念表达；谈判协商；用于激励团队的沟通；以及在危机情境中的沟通；人际沟通、书面写作与会议中的沟通。", "SS318": "私人健身教练的角色、职责与职业道德；对客户准备情况与体能的评估；针对多样化目标设计适当的训练方案；正确且安全动作的示范；基础营养方面的指导；激发动机以实现可持续的目标达成；以及销售技能与关系建立。", "SS411": "项目可行性研究与成果评估；体育与运动科学、身体锻炼与抗衰老领域的商业计划制定；商业计划的分析与展示实践；基础管理原理；组织内部资源管理；客户关系管理；体育与运动科学及身体锻炼相关业务的管理原理；以及管理与战略规划。", "SS401": "高级团体健身训练；复杂音乐节奏的运用；高级有氧舞蹈自由动作组合的编排与呈现；高级有氧舞蹈带领者的要素（动作组合、技术、教学方法、沟通方式及个人特色）；有氧舞蹈的示范与教学实践；以及将高级有氧舞蹈应用于其他形式团体健身训练。", "SS402": "发展历程；普拉提的原理与重要性；身体控制、呼吸以及符合普拉提原则的正确姿势；普拉提技术的应用，包括垫上训练与器械训练；通过普拉提训练发展核心力量、柔韧性、平衡能力以及动作的准确性；对动作进行准确的示范与教学，并提供安全性的指导。", "SS403": "将运动生理学原理应用于运动锻炼，以为具有特殊需求的人群制定安全的运动方案，包括孕妇、儿童与青少年、糖尿病、高血压及肥胖等人群，以及其他人群。", "SS404": "将体育与运动训练原理应用于团队运动项目（足球、排球、篮球）的训练与发展，以实现最高潜能；训练方案的制定与实践，涵盖力量、功率、速度、耐力与灵敏性的训练；以及复合训练与综合训练的原理与实践。", "SS405": "将体育与运动训练原理应用于水上运动项目（游泳、水球、跳水、水下舞蹈、帆船与风帆冲浪）的训练与发展，以实现最高潜能；训练方案的制定与实践，涵盖力量、功率、速度、耐力与灵敏性的训练；以及复合训练与综合训练的原理与实践。", "SS406": "将体育与运动训练原理应用于持拍类运动项目（羽毛球、网球、乒乓球）的训练与发展，以实现最高潜能；训练方案的制定与实践，涵盖力量、功率、速度、耐力与灵敏性的训练；以及复合训练与综合训练的原理与实践。", "SS407": "健身与体育相关业务的市场营销原理与营销策略；市场分析原理；品牌建设；营销传播；以及营销活动成效的评估。", "SS408": "健身与体育业务中的人力资源管理原理，包括人员招聘、培训、评估、激励、团队发展以及绩效评估，直至在组织中留住有能力的员工。", "SS409": "与体育与健身业务相关的法律与法规，涵盖企业设立与经营、消费者保护、服务安全、合同与知识产权、劳动法以及运动员的权利与福利；以及体育经营者与体育服务提供者的职业道德规范。", "SS410": "组织及各类项目绩效评估的原理与工具，包括关键绩效指标（KPI）的运用，以及数据分析原理，用于评估绩效并将结果用于改进战略规划。", "SS412": "在政府机构、国有企业或私营机构中进行的专业实习，相关工作领域为体育与运动科学。", "MA208": "代数、代数函数和隐函数、二维和三维空间中的向量、矩阵和线性方程组、数学归纳法、数列与级数。", "PH207": "运动定律、力与牛顿定律、基础电学、欧姆定律、串联电路、并联电路、流体压力。", "MA209": "先修课程：MA 208 基础数学函数的极限与连续性、函数的导数、不定形式、差分导数与线性近似、函数的泰勒级数、导数的应用、不定积分、积分技巧、定积分及其应用、数值积分、不规范积分、向量值函数的导数与积分、路径积分、可分离变量的微分方程。", "MA210": "先修课程：MA 209 工程数学 1柱面和平面二次曲面、多变量函数、多变量函数的极限与连续性、偏导数、链式法则、全差分、函数的极值、直角坐标系与极坐标系中的二重积分、直角坐标系、柱坐标系和球坐标系中的三重积分、多重积分的应用，包括求面积、体积、质量、质心和力矩、拉普拉斯变换与傅里叶变换。", "PE103": "计算机技术、计算机的组成部分和数据存储系统、计算机处理及其技术应用，以及未来技术的发展趋势。包括计算机概念、计算机组件、基础操作系统的使用，以及工程领域中应用的成套软件程序。", "PE104": "计算、使用逻辑进行推理和解 function en_of(cat){let suf='',base=cat;const S=[['-必修',' (Required)'],['-选修',' (Elective)'],['-主修',' (Major)']];for(const sa of S){if(base.endsWith(sa[0])){suf=sa[1];base=base.slice(0,-sa[0].length);break;}}if(base.indexOf('·')>=0){const parts=base.split('·');for(const kv of ENM){if(parts[0].indexOf(kv[0])>=0)return kv[1]+' ('+parts[1]+')';}}for(const kv of ENM){if(base.indexOf(kv[0])>=0)return kv[1]+suf;}return base;}

function parseCSV(text){
  const rows=[];let row=[],f='',q=false;
  for(let i=0;i<text.length;i++){const ch=text[i];
    if(q){ if(ch=='"'){ if(text[i+1]=='"'){f+='"';i++;} else q=false; } else f+=ch; }
    else { if(ch=='"')q=true; else if(ch==',' ){row.push(f);f='';} else if(ch=='\n'){row.push(f);rows.push(row);row=[];f='';} else if(ch=='\r'){} else f+=ch; }
  }
  if(f.length||row.length){row.push(f);rows.push(row);}
  return rows;
}
function buildData(rows){
  const hdr=rows[0].map(h=>h.trim());
  const idx={}; hdr.forEach((h,i)=>idx[h]=i);
  const get=(r,name)=>{const i=idx[name];return i==null?'':(r[i]||'').trim();};
  const byProg={};
  for(let i=1;i<rows.length;i++){const r=rows[i];if(!r||r.length<3)continue;
    const prog=get(r,'专业'),ver=get(r,'版本'); if(!prog||!ver)continue;
    const pid=prog+'-'+ver; (byProg[pid]=byProg[pid]||{prog,ver,rows:[]}).rows.push(r);
  }
  const out={};
  Object.keys(byProg).forEach(pid=>{
    const pr=byProg[pid],prog=pr.prog,ver=pr.ver;
    const gm={},order=[];
    pr.rows.forEach(r=>{
      let cat=get(r,'版块中文'); const need=get(r,'区块学分'); const lvl=get(r,'必修/选修');
      let eff=cat;
      if(GE_BASES.has(cat)&&cat.indexOf('必修')<0&&cat.indexOf('选修')<0&&(lvl=='必修'||lvl=='选修'))eff=cat+'-'+lvl;
      const key=eff+'||'+need;
      if(!gm[key]){gm[key]={cat:eff,need:need,courses:[]};order.push(key);}
      const code=get(r,'课程代码');
      gm[key].courses.push({code:code,zh:get(r,'中文名'),en:get(r,'英文名'),cr:get(r,'学分'),link:get(r,'对接课程'),fixed:get(r,'固定开课'),memo:get(r,'备注'),desc:DESC[code.replace(/ /g,'')]||''});
    });
    let groups=order.map(k=>gm[k]);
    const baseOf=c=>{for(const s of['-必修','-选修','-主修'])if(c.endsWith(s))return c.slice(0,-s.length);return c;};
    const lr=c=>c.endsWith('-必修')?0:(c.endsWith('-选修')?1:0);
    const bidx={}; groups.forEach((g,i)=>{const b=baseOf(g.cat);if(!(b in bidx))bidx[b]=i;});
    groups=groups.map((g,i)=>[i,g]).sort((a,b)=>(bidx[baseOf(a[1].cat)]-bidx[baseOf(b[1].cat)])||(lr(a[1].cat)-lr(b[1].cat))||(a[0]-b[0])).map(x=>x[1]);
    groups.forEach(g=>{let nd=g.need;const n=parseFloat(nd);if(!isNaN(n))nd=String(Math.round(n));g.need=nd;g.caten=en_of(g.cat);g.kexiu=Math.round(g.courses.reduce((s,c)=>s+(parseFloat(c.cr)||0),0));});
    out[pid]={prog,ver,name:ENAME[prog]||prog,label:LABEL[pid]||pid,grad:GRAD[prog]||'',total:Math.round(pr.rows.reduce((s,r)=>s+(parseFloat(get(r,'学分'))||0),0)),count:pr.rows.length,blocks:groups};
  });
  const ordered={}; ORDER.forEach(k=>{if(out[k])ordered[k]=out[k];}); Object.keys(out).forEach(k=>{if(!ordered[k])ordered[k]=out[k];});
  return ordered;
}

let DATA={},cur='',tabsList=[];
function blkcr(b){return (b.need!==''&&b.need!=null)?b.need:b.kexiu}
function initTabs(){
  tabsList=tabsListBase.filter(k=>k==='CMP-CD'||DATA[k]);
  document.getElementById('tabs').innerHTML=tabsList.map(k=>k==='CMP-CD'
   ?`<div class="tab cmp" data-k="CMP-CD" onclick="sel('CMP-CD')">⇄ CD 对照</div>`
   :`<div class="tab" data-k="${k}" onclick="sel('${k}')">${DATA[k].label}</div>`).join('');
  const progKeys=['IB-2565','FA-2565','TM-2565','CD-2569新','CD-2567旧','CA-2566','IT-2568','SC-2569','EV-2568'].filter(k=>DATA[k]);
  document.getElementById('fprog').innerHTML='<option value="ALL">全部专业</option>'+progKeys.map(k=>`<option value="${k}">${DATA[k].label}</option>`).join('');
}
function sel(k){cur=k;document.getElementById('fq').value='';var fp=document.getElementById('fprog');if(k!=='CMP-CD')fp.value=k;render()}
function selDrop(v){if(v!=='ALL')cur=v;render()}
function tg(id){var e=document.getElementById(id);if(e)e.style.display=e.style.display==='none'?'block':'none'}
let RID=0;
function sheet(p,cmp){
  let secs='';
  p.blocks.forEach(b=>{
    const en=b.caten||'';
    const isFree=b.cat.indexOf('自由选修')>=0;
    if(isFree){ secs+=`<div class="sec"><div class="sh">${b.cat} <span class="en">${en}</span><em>${blkcr(b)} cr</em></div><div class="frnote">自由选修 · 学生自选，不列课</div></div>`; return; }
    let rh='';
    b.courses.forEach(c=>{
      const id='d'+p.label.replace(/[^A-Za-z0-9]/g,'')+(RID++);
      const lk=c.link?` <span class=lk>←${c.link}</span>`:'';
      const dot=c.desc?' <span class=dot>ⓘ</span>':'';
      const fx=c.fixed?'<span class=fx>常</span>':'';
      const memo=c.memo?`<span class=memo>📝${c.memo}</span>`:'';
      rh+=`<div class="r" onclick="tg('${id}')"><span class="c">${fx}${c.code}</span><span class="n"><span class="zh">${c.zh}${dot}${memo}</span><span class="en">${c.en||''}</span></span><span class="g">${c.cr}${lk}</span></div>`;
      if(c.desc) rh+=`<div class="dz" id="${id}" style="display:none">${c.desc}</div>`;
    });
    secs+=`<div class="sec"><div class="sh">${b.cat} <span class="en">${en}</span><em>${blkcr(b)} cr</em></div>${rh}</div>`;
  });
  if(cmp) return `<div class="sheet cmpsheet"><div class="hd2"><b>${p.label}</b> · ${p.name}<div class="m2">Bachelor · 4 Years · ${p.grad||'—'} credits</div></div><div class="cols one">${secs}</div></div>`;
  return `<div class="sheet"><div class="hd"><div class="u">Dhurakij Pundit University</div><div class="t">Course Structure</div><div class="c">Chinese International College</div><div class="p">${p.name}</div><div class="cr2">Bachelor · 4 Years · ${p.grad||'—'} credits</div></div><div class="cols">${secs||'<div class=note>无课程</div>'}</div></div>`;
}
function searchAll(q){
  const scope=document.getElementById('fprog').value; let hits=[];
  Object.keys(DATA).forEach(k=>{if(scope!=='ALL'&&k!==scope)return;const p=DATA[k];p.blocks.forEach(b=>{b.courses.forEach(c=>{
    if(c.code&&(c.code.toLowerCase().includes(q)||(c.zh||'').toLowerCase().includes(q)||(c.en||'').toLowerCase().includes(q)||(c.link||'').toLowerCase().includes(q)))hits.push({pl:p.label,cat:b.cat,c:c});
  })})});
  if(!hits.length)return '<div class="note">没有符合「'+q+'」的科目</div>';
  let rows=hits.map((h,i)=>{const id='q'+i;const lk=h.c.link?` <span class=lk>←${h.c.link}</span>`:'';const fx=h.c.fixed?'<span class=fx>常</span>':'';const memo=h.c.memo?`<span class=memo>📝${h.c.memo}</span>`:'';const dot=h.c.desc?' <span class=dot>ⓘ</span>':'';
    let r=`<tr onclick="tg('${id}')"><td class=sp>${h.pl}</td><td class=code>${fx}${h.c.code}</td><td><b>${h.c.zh||'—'}</b>${dot}${memo}<div class=en2>${h.c.en||''}</div></td><td class=blk2>${h.cat}</td><td class=crc>${h.c.cr}${lk}</td></tr>`;
    if(h.c.desc)r+=`<tr id="${id}" style="display:none"><td colspan=5 class=dz2cell><div class=dz2>${h.c.desc}</div></td></tr>`;return r;}).join('');
  return `<div class="srhd">🔍 搜索「${q}」· 共 ${hits.length} 门</div><table class="srtb"><thead><tr><th>专业</th><th>代码</th><th>课程</th><th>版块</th><th>学分</th></tr></thead><tbody>${rows}</tbody></table>`;
}
function render(){
  const q=(document.getElementById('fq').value||'').toLowerCase().trim();
  document.querySelectorAll('.tab').forEach(x=>x.classList.toggle('on',!q&&x.dataset.k===cur));
  if(q){document.getElementById('out').innerHTML=searchAll(q);return;}
  if(cur==='CMP-CD'){document.getElementById('out').innerHTML=`<div class="cmphd">⇄ CD 创意设计 · 旧(67) ↔ 新(69) 对照</div><div class="cmpwrap"><div class="cmpcol">${DATA['CD-2567旧']?sheet(DATA['CD-2567旧'],true):''}</div><div class="cmpcol">${DATA['CD-2569新']?sheet(DATA['CD-2569新'],true):''}</div></div>`;return;}
  document.getElementById('out').innerHTML=DATA[cur]?sheet(DATA[cur]):'<div class=note>无数据</div>';
}
function loadSheet(){
  document.getElementById('status').textContent='从 Google Sheet 载入中…';
  fetch(SHEET_CSV+'&_='+Date.now()).then(r=>r.text()).then(t=>{
    DATA=buildData(parseCSV(t));
    if(!cur||!DATA[cur])cur=tabsListBase.find(k=>DATA[k])||Object.keys(DATA)[0];
    initTabs(); render();
    document.getElementById('status').textContent='✅ 已从 Google Sheet 载入 · '+new Date().toLocaleString()+' · 共 '+Object.keys(DATA).length+' 个专业-版本';
  }).catch(e=>{document.getElementById('status').innerHTML='⚠️ 无法读取 Google Sheet（请确认该表已设为「知道链接者可查看」）。错误：'+e;});
}
loadSheet();
</script></body></html>
